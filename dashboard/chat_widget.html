<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ 챗봇</title>
<style>
  /* ── 리셋 & 기본 ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', 'PingFang SC', sans-serif; }

  /* ── 플로팅 버튼 ── */
  #chat-fab {
    position: fixed; bottom: 28px; right: 28px; z-index: 9000;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, #1976D2, #42A5F5);
    color: #fff; font-size: 26px; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(25,118,210,.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s, box-shadow .2s;
  }
  #chat-fab:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(25,118,210,.55); }
  #chat-fab .badge {
    position: absolute; top: 0; right: 0;
    background: #E53935; color: #fff; font-size: 11px;
    width: 18px; height: 18px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }

  /* ── 채팅 패널 ── */
  #chat-panel {
    position: fixed; bottom: 100px; right: 28px; z-index: 9001;
    width: 380px; max-height: 600px;
    background: #fff; border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
    display: flex; flex-direction: column;
    transform: scale(.85) translateY(20px);
    opacity: 0; pointer-events: none;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s;
  }
  #chat-panel.open {
    transform: scale(1) translateY(0);
    opacity: 1; pointer-events: all;
  }

  /* 헤더 */
  .chat-header {
    background: linear-gradient(135deg, #1976D2, #42A5F5);
    color: #fff; border-radius: 16px 16px 0 0;
    padding: 14px 16px; display: flex; align-items: center; gap: 10px;
  }
  .chat-header .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.25);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .chat-header .info { flex: 1; }
  .chat-header .title { font-size: 15px; font-weight: 600; }
  .chat-header .subtitle { font-size: 11px; opacity: .8; margin-top: 1px; }
  .chat-header .lang-badge {
    font-size: 11px; background: rgba(255,255,255,.2);
    padding: 2px 8px; border-radius: 10px; letter-spacing: .5px;
  }
  .chat-header .close-btn {
    background: none; border: none; color: #fff;
    font-size: 20px; cursor: pointer; opacity: .8; line-height: 1;
  }
  .chat-header .close-btn:hover { opacity: 1; }

  /* 메시지 영역 */
  .chat-body {
    flex: 1; overflow-y: auto; padding: 14px 12px;
    scroll-behavior: smooth;
    background: #F8FAFC;
  }
  .chat-body::-webkit-scrollbar { width: 4px; }
  .chat-body::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }

  /* 메시지 버블 */
  .msg { display: flex; gap: 8px; margin-bottom: 12px; animation: fadeUp .2s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }

  .msg.user { flex-direction: row-reverse; }
  .msg .bubble {
    max-width: 78%; padding: 10px 13px;
    border-radius: 14px; font-size: 13.5px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.bot  .bubble { background: #fff; border: 1px solid #E2E8F0; color: #1E293B; border-radius: 4px 14px 14px 14px; }
  .msg.user .bubble { background: #1976D2; color: #fff; border-radius: 14px 4px 14px 14px; }

  .msg .bot-icon {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg,#1976D2,#42A5F5);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }

  /* 관련 FAQ */
  .related-faqs { margin-top: 8px; }
  .related-faqs .label {
    font-size: 11px; color: #64748B; margin-bottom: 4px; font-weight: 600;
  }
  .faq-chip {
    display: inline-block; background: #EFF6FF; color: #1D4ED8;
    border: 1px solid #BFDBFE; border-radius: 20px;
    font-size: 12px; padding: 3px 10px; margin: 2px 3px 2px 0;
    cursor: pointer; text-decoration: none;
    transition: background .15s;
  }
  .faq-chip:hover { background: #DBEAFE; }

  /* 피드백 */
  .feedback-row {
    display: flex; gap: 6px; margin-top: 8px; align-items: center;
  }
  .feedback-row .fb-label { font-size: 11px; color: #94A3B8; }
  .fb-btn {
    background: none; border: 1px solid #E2E8F0;
    border-radius: 20px; padding: 2px 10px; font-size: 12px; cursor: pointer;
    color: #64748B; transition: all .15s;
  }
  .fb-btn:hover { background: #F1F5F9; }
  .fb-btn.active-helpful { background: #DCFCE7; color: #16A34A; border-color: #86EFAC; }
  .fb-btn.active-nothelpful { background: #FEE2E2; color: #DC2626; border-color: #FCA5A5; }

  /* 신뢰도 뱃지 */
  .confidence {
    display: inline-block; font-size: 10px; padding: 1px 7px;
    border-radius: 10px; margin-left: 6px; vertical-align: middle;
  }
  .conf-high   { background: #DCFCE7; color: #166534; }
  .conf-medium { background: #FEF9C3; color: #854D0E; }
  .conf-low    { background: #FEE2E2; color: #991B1B; }

  /* 타이핑 인디케이터 */
  .typing { display: flex; gap: 4px; padding: 8px 4px; align-items: center; }
  .typing span {
    width: 7px; height: 7px; background: #94A3B8; border-radius: 50%;
    animation: bounce .9s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40%          { transform: translateY(-6px); }
  }

  /* 입력창 */
  .chat-footer {
    border-top: 1px solid #E2E8F0;
    padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end;
    background: #fff; border-radius: 0 0 16px 16px;
  }
  #chat-input {
    flex: 1; resize: none; border: 1px solid #E2E8F0;
    border-radius: 10px; padding: 8px 11px;
    font-size: 13.5px; outline: none; max-height: 100px;
    font-family: inherit; line-height: 1.5; color: #1E293B;
    transition: border-color .15s;
  }
  #chat-input:focus { border-color: #60A5FA; }
  #chat-send {
    width: 38px; height: 38px; border-radius: 10px;
    background: #1976D2; color: #fff; border: none; cursor: pointer;
    font-size: 17px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s;
  }
  #chat-send:hover { background: #1565C0; }
  #chat-send:disabled { background: #CBD5E1; cursor: not-allowed; }

  /* 반응형 */
  @media (max-width: 440px) {
    #chat-panel { width: calc(100vw - 24px); right: 12px; bottom: 90px; }
    #chat-fab   { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<!-- 플로팅 버튼 -->
<button id="chat-fab" aria-label="챗봇 열기" onclick="toggleChat()">
  💬
  <span class="badge" id="unread-badge">1</span>
</button>

<!-- 채팅 패널 -->
<div id="chat-panel" role="dialog" aria-label="FAQ 챗봇">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <div class="title">FAQ 도우미</div>
      <div class="subtitle">질문하시면 바로 답변해 드려요</div>
    </div>
    <span class="lang-badge" id="lang-indicator">KO</span>
    <button class="close-btn" onclick="toggleChat()" aria-label="닫기">✕</button>
  </div>

  <div class="chat-body" id="chat-body">
    <!-- 초기 환영 메시지 -->
  </div>

  <div class="chat-footer">
    <textarea
      id="chat-input"
      rows="1"
      placeholder="질문을 입력하세요 / 请输入您的问题"
      maxlength="500"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="chat-send" onclick="sendMessage()" aria-label="전송">➤</button>
  </div>
</div>

<script>
// ── 설정 ───────────────────────────────────────────────────────────────────
const API_BASE  = (window.FAQ_API_BASE || 'http://localhost:8000') + '/api/v1';
const FAQ_BASE  = window.FAQ_PAGE_BASE || '/faqs';   // FAQ 상세 페이지 기본 URL

// ── 상태 ───────────────────────────────────────────────────────────────────
let sessionId   = null;
let isOpen      = false;
let isFetching  = false;
let msgCount    = 0;

// ── 초기화 ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  appendBotMsg(
    '안녕하세요! 궁금한 점을 자유롭게 질문해 주세요. 😊\n' +
    '您好！请随时提问，我将为您解答。',
    [], 'medium', true   // isWelcome = true (피드백 숨김)
  );
  showBadge(false);
});

// ── 패널 토글 ──────────────────────────────────────────────────────────────
function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chat-panel').classList.toggle('open', isOpen);
  if (isOpen) {
    showBadge(false);
    document.getElementById('chat-input').focus();
    scrollBottom();
  }
}

function showBadge(show) {
  document.getElementById('unread-badge').style.display = show ? 'flex' : 'none';
}

// ── 메시지 전송 ────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || isFetching) return;

  input.value = '';
  autoResize(input);
  appendUserMsg(text);
  isFetching = true;
  document.getElementById('chat-send').disabled = true;

  const typingId = showTyping();

  try {
    const resp = await fetch(`${API_BASE}/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, session_id: sessionId }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    sessionId = data.session_id;
    updateLangIndicator(data.language);
    removeTyping(typingId);
    appendBotMsg(data.answer, data.related_faqs, data.confidence, false);

    if (!isOpen) showBadge(true);
  } catch (err) {
    removeTyping(typingId);
    appendBotMsg('❗ 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.', [], 'low', false);
    console.error(err);
  } finally {
    isFetching = false;
    document.getElementById('chat-send').disabled = false;
    scrollBottom();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── 메시지 렌더링 ──────────────────────────────────────────────────────────
function appendUserMsg(text) {
  const body = document.getElementById('chat-body');
  const div  = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  body.appendChild(div);
  scrollBottom();
}

function appendBotMsg(text, relatedFaqs, confidence, isWelcome) {
  const id   = `msg-${++msgCount}`;
  const body = document.getElementById('chat-body');
  const div  = document.createElement('div');
  div.className = 'msg bot';
  div.id = id;

  const confClass = `conf-${confidence}`;
  const confLabel = confidence === 'high' ? '높음' : confidence === 'medium' ? '보통' : '낮음';
  const confBadge = isWelcome ? '' : `<span class="confidence ${confClass}">${confLabel}</span>`;

  // 관련 FAQ 칩
  let relatedHtml = '';
  if (relatedFaqs && relatedFaqs.length > 0) {
    const chips = relatedFaqs.map(f =>
      `<a class="faq-chip" href="${FAQ_BASE}/${f.faq_id}" target="_blank">${escHtml(f.question)}</a>`
    ).join('');
    const label = relatedFaqs[0]?.language === 'zh' ? '相关问题' : '관련 FAQ';
    relatedHtml = `
      <div class="related-faqs">
        <div class="label">📎 ${label}</div>
        ${chips}
      </div>`;
  }

  // 피드백 버튼
  const feedbackHtml = isWelcome ? '' : `
    <div class="feedback-row">
      <span class="fb-label">도움이 되셨나요?</span>
      <button class="fb-btn" id="fb-yes-${id}" onclick="submitFeedback('${id}', true)">👍</button>
      <button class="fb-btn" id="fb-no-${id}"  onclick="submitFeedback('${id}', false)">👎</button>
    </div>`;

  div.innerHTML = `
    <div class="bot-icon">🤖</div>
    <div>
      <div class="bubble">
        ${escHtml(text)}${confBadge}
        ${relatedHtml}
        ${feedbackHtml}
      </div>
    </div>`;

  body.appendChild(div);
  scrollBottom();
}

// ── 타이핑 인디케이터 ──────────────────────────────────────────────────────
function showTyping() {
  const id   = `typing-${Date.now()}`;
  const body = document.getElementById('chat-body');
  const div  = document.createElement('div');
  div.className = 'msg bot';
  div.id = id;
  div.innerHTML = `
    <div class="bot-icon">🤖</div>
    <div class="bubble">
      <div class="typing">
        <span></span><span></span><span></span>
      </div>
    </div>`;
  body.appendChild(div);
  scrollBottom();
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

// ── 피드백 ─────────────────────────────────────────────────────────────────
function submitFeedback(msgId, helpful) {
  if (!sessionId) return;
  const yesBtn = document.getElementById(`fb-yes-${msgId}`);
  const noBtn  = document.getElementById(`fb-no-${msgId}`);

  yesBtn.className = 'fb-btn' + (helpful  ? ' active-helpful'    : '');
  noBtn.className  = 'fb-btn' + (!helpful ? ' active-nothelpful' : '');

  // 비동기 전송 (실패해도 UX 영향 없음)
  fetch(`${API_BASE}/chat/feedback`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ session_id: sessionId, helpful }),
  }).catch(() => {});
}

// ── 언어 표시 ──────────────────────────────────────────────────────────────
function updateLangIndicator(lang) {
  const el = document.getElementById('lang-indicator');
  el.textContent = lang === 'zh' ? '中文' : 'KO';
}

// ── 유틸 ───────────────────────────────────────────────────────────────────
function scrollBottom() {
  const body = document.getElementById('chat-body');
  body.scrollTop = body.scrollHeight;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}
</script>
</body>
</html>
